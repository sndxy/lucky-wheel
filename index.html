<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸運大轉盤 - 專業進階版</title>
    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #334155; --primary: #6366f1; --accent: #f43f5e; --border: #e2e8f0; --wheel-border: #94a3b8; --pointer: #f59e0b;
        }
        [data-theme="dark"] {
            --bg: #111827; --card: #1f2937; --text: #f9fafb; --primary: #38bdf8; --accent: #818cf8; --border: #374151; --wheel-border: #38bdf8; --pointer: #fbbf24;
        }
        [data-theme="warm"] {
            --bg: #fdf6e3; --card: #ffffff; --text: #5d4037; --primary: #d4a373; --accent: #bc6c25; --border: #eee0c9; --wheel-border: #bc6c25; --pointer: #8d6e63;
        }
        * { box-sizing: border-box; } 
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; padding: 40px 20px; min-height: 100vh; transition: 0.4s; }
        .theme-switcher { position: fixed; top: 20px; right: 20px; display: flex; gap: 8px; z-index: 100; }
        .theme-btn { padding: 6px 12px; border-radius: 10px; border: 2px solid var(--border); cursor: pointer; font-size: 0.8rem; background: var(--card); color: var(--text); }
        .main-container { display: flex; flex-wrap: wrap; gap: 30px; max-width: 1100px; width: 100%; justify-content: center; }
        .card { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; }
        .wheel-section { flex: 1; min-width: 380px; text-align: center; }
        .wheel-container { position: relative; width: 360px; height: 360px; margin: 20px auto; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 10px solid var(--wheel-border); transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); background: #fff; }
        .pointer-wrapper { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); z-index: 50; width: 44px; height: 65px; transform-origin: 50% 10%; }
        .pointer-needle { width: 100%; height: 100%; background: var(--pointer); clip-path: polygon(20% 0%, 80% 0%, 100% 25%, 50% 100%, 0% 25%); border-radius: 40% 40% 50% 50%; transition: transform 0.1s; }
        .btn-spin { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; width: 100%; font-size: 1.5rem; padding: 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: 800; }
        .side-section { flex: 1.2; min-width: 380px; display: flex; flex-direction: column; gap: 20px; }
        .input-box { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); color: var(--text); margin-top: 5px; }
        .history-card { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .exclude-btn { background: var(--text); color: var(--card); border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: var(--card); padding: 40px; border-radius: 40px; text-align: center; max-width: 400px; width: 85%; border: 3px solid var(--primary); }
        
        /* 新增：批次匯入區域樣式 */
        .batch-area { background: var(--bg); padding: 15px; border-radius: 15px; margin-top: 10px; display: none; }
        .tab-btn { padding: 5px 15px; cursor: pointer; border-bottom: 2px solid transparent; opacity: 0.6; }
        .tab-btn.active { border-color: var(--primary); opacity: 1; font-weight: bold; }
    </style>
</head>
<body>

<div class="theme-switcher">
    <button class="theme-btn" onclick="setTheme('light')">🌿 莫蘭迪</button>
    <button class="theme-btn" onclick="setTheme('dark')">🌌 賽博深</button>
    <button class="theme-btn" onclick="setTheme('warm')">☕ 暖焦糖</button>
</div>

<div class="main-container">
    <div class="card wheel-section">
        <h1>幸運大轉盤</h1>
        <div class="wheel-container">
            <div class="pointer-wrapper"><div class="pointer-needle" id="needle"></div></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        <button class="btn-spin" id="spinBtn" onclick="spin()">立即開始抽獎</button>
    </div>

    <div class="side-section">
        <div class="card">
            <label>🎁 獎項名稱</label>
            <input type="text" id="prizeName" class="input-box" value="神秘精美小禮物">
        </div>

        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0;">👥 參加成員 (<span id="count">0</span>)</h3>
                <div style="font-size: 0.8rem;">
                    <span class="tab-btn active" id="singleTab" onclick="toggleInputMode('single')">單筆</span> | 
                    <span class="tab-btn" id="batchTab" onclick="toggleInputMode('batch')">批次匯入</span>
                </div>
            </div>

            <div id="singleInputArea" style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="itemName" class="input-box" style="margin:0;" placeholder="輸入姓名...">
                <button onclick="addItem()" style="background:var(--primary); color:white; border:none; border-radius:12px; padding:0 20px; cursor:pointer;">加入</button>
            </div>

            <div id="batchInputArea" class="batch-area">
                <p style="font-size: 0.8rem; margin:0 0 10px 0;">可貼上人名(用逗號或換行隔開) 或 上傳檔案</p>
                <textarea id="batchList" class="input-box" rows="4" placeholder="例如：張三, 李四, 王五..."></textarea>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="importBatch()" style="flex:1; background:var(--primary); color:white; border:none; padding:8px; border-radius:10px; cursor:pointer;">確認匯入</button>
                    <button onclick="document.getElementById('fileInput').click()" style="flex:1; background:var(--text); color:var(--card); border:none; padding:8px; border-radius:10px; cursor:pointer;">讀取檔案</button>
                    <input type="file" id="fileInput" hidden accept=".txt,.csv" onchange="handleFile(this)">
                </div>
            </div>

            <div id="memberList" style="max-height:150px; overflow-y:auto; margin-top:15px; border-top: 1px solid var(--border); padding-top: 10px;"></div>
        </div>

        <div class="card" style="flex:1;"><h3>📜 獲獎英雄榜</h3><div id="historyList"></div></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div style="font-size: 3rem;">🎉</div>
        <h2 id="modalWinner" style="font-size: 3rem; margin: 15px 0;"></h2>
        <p>獲得：<span id="modalPrize" style="color:var(--primary); font-weight:bold;"></span></p>
        <button class="btn-spin" onclick="closeModal()">收下好運</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const needle = document.getElementById('needle');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    let items = ["糖糖", "多多", "布丁", "泡泡", "露露", "草莓"];
    let currentRotation = 0, isSpinning = false, lastPlayedAngle = 0;

    function setTheme(theme) { document.documentElement.setAttribute('data-theme', theme); drawWheel(); }

    function toggleInputMode(mode) {
        document.getElementById('singleInputArea').style.display = mode === 'single' ? 'flex' : 'none';
        document.getElementById('batchInputArea').style.display = mode === 'batch' ? 'block' : 'none';
        document.getElementById('singleTab').classList.toggle('active', mode === 'single');
        document.getElementById('batchTab').classList.toggle('active', mode === 'batch');
    }

    // 批次匯入解析
    function importBatch() {
        const text = document.getElementById('batchList').value;
        if (!text.trim()) return;
        const newNames = text.split(/[\n,，\s]+/).filter(n => n.trim() !== "");
        items = [...items, ...newNames];
        document.getElementById('batchList').value = "";
        drawWheel();
        toggleInputMode('single');
    }

    // 檔案讀取處理
    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const newNames = content.split(/[\n,，\r\s]+/).filter(n => n.trim() !== "");
            items = [...items, ...newNames];
            drawWheel();
            alert("已成功匯入 " + newNames.length + " 位成員！");
        };
        reader.readAsText(file);
    }

    function playTick() {
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWin() {
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1); osc.stop(audioCtx.currentTime + i * 0.1 + 0.5);
        });
    }

    function drawWheel() {
        const num = items.length, arc = (2 * Math.PI) / (num || 1);
        ctx.clearRect(0, 0, 500, 500);
        items.forEach((item, i) => {
            const angle = i * arc;
            ctx.beginPath();
            const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A0C4FF', '#BDB2FF', '#FFC6FF'];
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(250, 250); ctx.arc(250, 250, 240, angle, angle + arc); ctx.fill();
            ctx.save(); ctx.translate(250, 250); ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right"; ctx.fillStyle = "#334155";
            ctx.font = num > 20 ? "bold 12px sans-serif" : "bold 18px sans-serif";
            ctx.fillText(item.substring(0, 8), 220, 5); ctx.restore();
        });
        document.getElementById('count').innerText = num;
        renderList();
    }

    function renderList() {
        const list = document.getElementById('memberList'); list.innerHTML = "";
        items.forEach((name, i) => {
            list.innerHTML += `<div style="display:flex; gap:8px; margin-bottom:5px;"><input class="input-box" style="margin:0; padding:5px 10px; font-size:0.9rem;" value="${name}" onchange="items[${i}]=this.value; drawWheel()"><button onclick="items.splice(${i},1); drawWheel()" style="background:#fee2e2; color:#ef4444; border:none; border-radius:8px; width:35px; cursor:pointer;">✕</button></div>`;
        });
    }

    function addItem() { const input = document.getElementById('itemName'); if (input.value) { items.push(input.value); input.value = ""; drawWheel(); } }

    function spin() {
        if (items.length < 2 || isSpinning) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isSpinning = true;
        const prize = document.getElementById('prizeName').value;
        const spinBtn = document.getElementById('spinBtn'); spinBtn.disabled = true;
        const extraDegree = Math.floor(Math.random() * 360) + 4320;
        currentRotation += extraDegree;
        canvas.style.transform = `rotate(${currentRotation}deg)`;
        const spinLoop = () => {
            if (!isSpinning) return;
            const style = window.getComputedStyle(canvas), matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
            const step = 360 / items.length;
            const currentSegment = Math.floor((angle + 360) % 360 / step);
            const lastSegment = Math.floor((lastPlayedAngle + 360) % 360 / step);
            if (currentSegment !== lastSegment) {
                playTick();
                needle.style.transform = "rotate(-20deg)";
                setTimeout(() => needle.style.transform = "rotate(0deg)", 50);
            }
            lastPlayedAngle = angle;
            requestAnimationFrame(spinLoop);
        };
        requestAnimationFrame(spinLoop);
        setTimeout(() => {
            isSpinning = false; spinBtn.disabled = false;
            playWin();
            const actualDegree = currentRotation % 360;
            const index = Math.floor((360 - (actualDegree % 360) + 270) % 360 / (360 / items.length));
            const winner = items[index];
            document.getElementById('modalWinner').innerText = winner;
            document.getElementById('modalPrize').innerText = prize;
            document.getElementById('modalOverlay').style.display = 'flex';
            addHistory(winner, prize);
        }, 5100);
    }

    function addHistory(winner, prize) {
        const history = document.getElementById('historyList');
        const entry = document.createElement('div');
        entry.className = 'history-card';
        entry.innerHTML = `<div><b>${winner}</b><br><small>${prize}</small></div><button class="exclude-btn" onclick="excludeWinner('${winner}', this)">排除</button>`;
        history.prepend(entry);
    }

    function excludeWinner(name, btn) {
        const idx = items.indexOf(name);
        if (idx > -1) { items.splice(idx, 1); drawWheel(); btn.innerText = "已排除"; btn.disabled = true; btn.style.opacity = "0.5"; }
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    drawWheel();
    document.getElementById('itemName').addEventListener('keypress', e => e.key === 'Enter' && addItem());
</script>
</body>
</html>
